<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pessoa × Carro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: monospace;
      background: #f4f4f4;
      color: #222;
      font-size: 14px;
    }

    header {
      background: #222;
      color: #fff;
      padding: 16px 24px;
      font-size: 16px;
      letter-spacing: 1px;
    }

    nav {
      display: flex;
      border-bottom: 2px solid #222;
      background: #fff;
    }

    nav button {
      padding: 12px 24px;
      border: none;
      border-right: 1px solid #ddd;
      background: transparent;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
      color: #555;
    }

    nav button.active {
      background: #222;
      color: #fff;
    }

    .tab { display: none; padding: 24px; max-width: 860px; }
    .tab.active { display: block; }

    .box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 20px;
    }

    .box h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    label { display: block; margin-bottom: 4px; font-size: 12px; color: #666; }

    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      font-family: monospace;
      font-size: 13px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #222;
      background: #fff;
    }

    .row { display: flex; gap: 12px; }
    .row input, .row select { flex: 1; }

    button.btn {
      padding: 8px 16px;
      border: 1px solid #222;
      background: #222;
      color: #fff;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
    }

    button.btn:hover { background: #444; }

    button.btn-outline {
      background: transparent;
      color: #222;
    }

    button.btn-outline:hover { background: #f0f0f0; }

    button.btn-danger {
      border-color: #c0392b;
      background: #c0392b;
      color: #fff;
      padding: 4px 10px;
      font-size: 12px;
    }

    button.btn-danger:hover { background: #a93226; }

    button.btn-edit {
      border-color: #888;
      background: transparent;
      color: #444;
      padding: 4px 10px;
      font-size: 12px;
    }

    button.btn-edit:hover { background: #eee; }

    .msg {
      display: inline-block;
      margin-left: 12px;
      font-size: 12px;
      padding: 4px 10px;
    }

    .msg.ok  { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .msg.err { background: #fdecea; color: #c62828; border: 1px solid #ef9a9a; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; background: #222; color: #fff; font-weight: normal; }
    td { padding: 8px 10px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #fafafa; }

    .empty { color: #999; font-size: 13px; padding: 12px 0; }
  </style>
</head>
<body>

<header>SISTEMA PESSOA × CARRO</header>

<nav>
  <button class="active" onclick="showTab('pessoas', this)">Pessoas</button>
  <button onclick="showTab('carros', this)">Carros</button>
  <button onclick="showTab('relacoes', this)">Relações</button>
</nav>

<!-- PESSOAS -->
<div id="tab-pessoas" class="tab active">
  <div class="box">
    <h2>Cadastrar Pessoa</h2>
    <label>Nome</label>
    <input type="text" id="p-nome" placeholder="Ex: João Silva">
    <label>Email</label>
    <input type="email" id="p-email" placeholder="Ex: joao@email.com">
    <button class="btn" onclick="criarPessoa()">Salvar</button>
    <span id="msg-pessoa" class="msg"></span>
  </div>
  <div class="box">
    <h2>Lista de Pessoas <button class="btn btn-outline" style="float:right;padding:4px 10px;font-size:12px" onclick="listarPessoas()">↺ atualizar</button></h2>
    <div id="lista-pessoas"><p class="empty">Carregando...</p></div>
  </div>
</div>

<!-- CARROS -->
<div id="tab-carros" class="tab">
  <div class="box">
    <h2>Cadastrar Carro</h2>
    <div class="row">
      <div style="flex:2">
        <label>Modelo</label>
        <input type="text" id="c-modelo" placeholder="Ex: Civic">
      </div>
      <div style="flex:2">
        <label>Marca</label>
        <input type="text" id="c-marca" placeholder="Ex: Honda">
      </div>
      <div style="flex:1">
        <label>Ano</label>
        <input type="number" id="c-ano" placeholder="Ex: 2022">
      </div>
    </div>
    <button class="btn" onclick="criarCarro()">Salvar</button>
    <span id="msg-carro" class="msg"></span>
  </div>
  <div class="box">
    <h2>Lista de Carros <button class="btn btn-outline" style="float:right;padding:4px 10px;font-size:12px" onclick="listarCarros()">↺ atualizar</button></h2>
    <div id="lista-carros"><p class="empty">Carregando...</p></div>
  </div>
</div>

<!-- RELAÇÕES -->
<div id="tab-relacoes" class="tab">
  <div class="box">
    <h2>Associar Pessoa ↔ Carro</h2>
    <div class="row">
      <div>
        <label>Pessoa</label>
        <select id="sel-pessoa"><option value="">-- selecione --</option></select>
      </div>
      <div>
        <label>Carro</label>
        <select id="sel-carro"><option value="">-- selecione --</option></select>
      </div>
    </div>
    <button class="btn" onclick="associar()">Associar</button>
    <span id="msg-relacao" class="msg"></span>
  </div>
  <div class="box">
    <h2>Lista de Relações <button class="btn btn-outline" style="float:right;padding:4px 10px;font-size:12px" onclick="listarRelacoes()">↺ atualizar</button></h2>
    <div id="lista-relacoes"><p class="empty">Carregando...</p></div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000'

  function showTab(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'))
    document.getElementById('tab-' + name).classList.add('active')
    btn.classList.add('active')
    if (name === 'relacoes') carregarSelects()
  }

  function showMsg(id, texto, tipo) {
    const el = document.getElementById(id)
    el.textContent = texto
    el.className = 'msg ' + tipo
    setTimeout(() => { el.textContent = ''; el.className = 'msg' }, 3000)
  }

  // ── PESSOAS ──────────────────────────────────────────
  async function criarPessoa() {
    const nome  = document.getElementById('p-nome').value.trim()
    const email = document.getElementById('p-email').value.trim()
    if (!nome || !email) return showMsg('msg-pessoa', 'Preencha todos os campos', 'err')

    const r = await fetch(`${API}/pessoas`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, email })
    })
    const d = await r.json()
    if (r.ok) {
      showMsg('msg-pessoa', 'Pessoa criada!', 'ok')
      document.getElementById('p-nome').value = ''
      document.getElementById('p-email').value = ''
      listarPessoas()
    } else {
      showMsg('msg-pessoa', d.erro || 'Erro ao criar', 'err')
    }
  }

  async function listarPessoas() {
    const r = await fetch(`${API}/pessoas`)
    const pessoas = await r.json()
    const div = document.getElementById('lista-pessoas')
    if (!pessoas.length) {
      div.innerHTML = '<p class="empty">Nenhuma pessoa cadastrada.</p>'
      return
    }
    div.innerHTML = `
      <table>
        <tr><th>ID</th><th>Nome</th><th>Email</th><th>Ações</th></tr>
        ${pessoas.map(p => `
          <tr>
            <td>${p.id}</td>
            <td><input id="ep-nome-${p.id}" value="${p.nome}" style="margin:0;width:140px"></td>
            <td><input id="ep-email-${p.id}" value="${p.email}" style="margin:0;width:180px"></td>
            <td>
              <button class="btn btn-edit" onclick="editarPessoa(${p.id})">salvar</button>
              <button class="btn btn-danger" onclick="excluirPessoa(${p.id})">excluir</button>
            </td>
          </tr>
        `).join('')}
      </table>`
  }

  async function editarPessoa(id) {
    const nome  = document.getElementById(`ep-nome-${id}`).value
    const email = document.getElementById(`ep-email-${id}`).value
    const r = await fetch(`${API}/pessoas/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, email })
    })
    if (r.ok) { alert('Atualizado!'); listarPessoas() }
  }

  async function excluirPessoa(id) {
    if (!confirm('Excluir pessoa?')) return
    await fetch(`${API}/pessoas/${id}`, { method: 'DELETE' })
    listarPessoas()
  }

  // ── CARROS ───────────────────────────────────────────
  async function criarCarro() {
    const modelo = document.getElementById('c-modelo').value.trim()
    const marca  = document.getElementById('c-marca').value.trim()
    const ano    = parseInt(document.getElementById('c-ano').value)
    if (!modelo || !marca || !ano) return showMsg('msg-carro', 'Preencha todos os campos', 'err')

    const r = await fetch(`${API}/carros`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ modelo, marca, ano })
    })
    const d = await r.json()
    if (r.ok) {
      showMsg('msg-carro', 'Carro criado!', 'ok')
      document.getElementById('c-modelo').value = ''
      document.getElementById('c-marca').value = ''
      document.getElementById('c-ano').value = ''
      listarCarros()
    } else {
      showMsg('msg-carro', d.erro || 'Erro ao criar', 'err')
    }
  }

  async function listarCarros() {
    const r = await fetch(`${API}/carros`)
    const carros = await r.json()
    const div = document.getElementById('lista-carros')
    if (!carros.length) {
      div.innerHTML = '<p class="empty">Nenhum carro cadastrado.</p>'
      return
    }
    div.innerHTML = `
      <table>
        <tr><th>ID</th><th>Modelo</th><th>Marca</th><th>Ano</th><th>Ações</th></tr>
        ${carros.map(c => `
          <tr>
            <td>${c.id}</td>
            <td><input id="ec-modelo-${c.id}" value="${c.modelo}" style="margin:0;width:100px"></td>
            <td><input id="ec-marca-${c.id}"  value="${c.marca}"  style="margin:0;width:100px"></td>
            <td><input id="ec-ano-${c.id}"    value="${c.ano}"    style="margin:0;width:60px" type="number"></td>
            <td>
              <button class="btn btn-edit" onclick="editarCarro(${c.id})">salvar</button>
              <button class="btn btn-danger" onclick="excluirCarro(${c.id})">excluir</button>
            </td>
          </tr>
        `).join('')}
      </table>`
  }

  async function editarCarro(id) {
    const modelo = document.getElementById(`ec-modelo-${id}`).value
    const marca  = document.getElementById(`ec-marca-${id}`).value
    const ano    = parseInt(document.getElementById(`ec-ano-${id}`).value)
    const r = await fetch(`${API}/carros/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ modelo, marca, ano })
    })
    if (r.ok) { alert('Atualizado!'); listarCarros() }
  }

  async function excluirCarro(id) {
    if (!confirm('Excluir carro?')) return
    await fetch(`${API}/carros/${id}`, { method: 'DELETE' })
    listarCarros()
  }

  // ── RELAÇÕES ─────────────────────────────────────────
  async function carregarSelects() {
    const [rp, rc] = await Promise.all([fetch(`${API}/pessoas`), fetch(`${API}/carros`)])
    const [pessoas, carros] = await Promise.all([rp.json(), rc.json()])

    document.getElementById('sel-pessoa').innerHTML =
      '<option value="">-- selecione --</option>' +
      pessoas.map(p => `<option value="${p.id}">${p.nome}</option>`).join('')

    document.getElementById('sel-carro').innerHTML =
      '<option value="">-- selecione --</option>' +
      carros.map(c => `<option value="${c.id}">${c.modelo} (${c.marca})</option>`).join('')

    listarRelacoes()
  }

  async function associar() {
    const pessoaId = parseInt(document.getElementById('sel-pessoa').value)
    const carroId  = parseInt(document.getElementById('sel-carro').value)
    if (!pessoaId || !carroId) return showMsg('msg-relacao', 'Selecione pessoa e carro', 'err')

    const r = await fetch(`${API}/relacoes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pessoaId, carroId })
    })
    const d = await r.json()
    if (r.ok) { showMsg('msg-relacao', 'Associado!', 'ok'); listarRelacoes() }
    else showMsg('msg-relacao', d.erro || 'Erro', 'err')
  }

  async function listarRelacoes() {
    const r = await fetch(`${API}/relacoes`)
    const lista = await r.json()
    const div = document.getElementById('lista-relacoes')
    if (!lista.length) {
      div.innerHTML = '<p class="empty">Nenhuma relação cadastrada.</p>'
      return
    }
    div.innerHTML = `
      <table>
        <tr><th>Pessoa</th><th>Email</th><th>Carro</th><th>Marca</th><th>Ano</th><th>Ação</th></tr>
        ${lista.map(rel => `
          <tr>
            <td>${rel.pessoa.nome}</td>
            <td>${rel.pessoa.email}</td>
            <td>${rel.carro.modelo}</td>
            <td>${rel.carro.marca}</td>
            <td>${rel.carro.ano}</td>
            <td>
              <button class="btn btn-danger" onclick="excluirRelacao(${rel.pessoaId}, ${rel.carroId})">excluir</button>
            </td>
          </tr>
        `).join('')}
      </table>`
  }

  async function excluirRelacao(pessoaId, carroId) {
    if (!confirm('Excluir relação?')) return
    await fetch(`${API}/relacoes/${pessoaId}/${carroId}`, { method: 'DELETE' })
    listarRelacoes()
  }

  // Carrega ao abrir
  listarPessoas()
  listarCarros()
</script>

</body>
</html>
